[project]
name = "ppt-codegen-core"
version = "0.1.0"
description = "AI PPT Code Generation Pipeline"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.135.0",
    "uvicorn>=0.34.0",
    "langgraph>=1.0.10",
    "langgraph-checkpoint-sqlite>=2.0.0",
    "langchain-openai>=0.3.0",
    "langchain-aws>=0.2.0",
    "jsonschema>=4.23.0",
    "python-dotenv>=1.0.0",
    "httpx>=0.28.0",
    "boto3>=1.36.0",
    "python-pptx>=1.0.0",
    "motor>=3.6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["core"]
