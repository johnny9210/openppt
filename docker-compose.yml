services:
  ppt-mongo:
    image: mongo:7
    ports:
      - "27030:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=pptgen
      - MONGO_INITDB_ROOT_PASSWORD=pptgen
    volumes:
      - mongo-data:/data/db
    networks:
      - ppt-net

  core:
    build:
      context: ./packages/core
      dockerfile: Dockerfile
    ports:
      - "8030:8000"
    env_file:
      - .env
    environment:
      - VALIDATOR_URL=http://validator:8001
      - MONGO_HOST=ppt-mongo
      - MONGO_PORT=27017
      - MONGO_USER=pptgen
      - MONGO_PASS=pptgen
      - MONGO_DB=ppt_codegen
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_SECURE=${MINIO_SECURE:-false}
    volumes:
      - ./packages/core:/app
      - ./packages/design-system:/app/design-system
      - ./packages/shared:/app/shared
    depends_on:
      - validator
      - ppt-mongo
    networks:
      - ppt-net
      - aidx_internal

  validator:
    build:
      context: ./packages/validator
      dockerfile: Dockerfile
    ports:
      - "8031:8001"
    volumes:
      - ./packages/validator:/app
      - /app/node_modules
    networks:
      - ppt-net

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    ports:
      - "3030:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8030
      - CORE_API_URL=http://core:8000
    volumes:
      - ./packages/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - core
    networks:
      - ppt-net

volumes:
  mongo-data:

networks:
  ppt-net:
    driver: bridge
  aidx_internal:
    external: true
